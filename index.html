var cur=0,pvis=true;
var sw=document.getElementById("sw");
var ifs=[];
slides.forEach(function(s){
  var f=document.createElement("iframe");
  f.src=s.src;
  sw.appendChild(f);
  ifs.push(f);
});
function parseItalic(text){
  return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<em>$1</em>").replace(/\*(.+?)\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");
}
function upd(s){
  var iv=s.teacherInstructions||"",qv=s.keyQuestions||"",ic=s.icon||"none";
  document.getElementById("tpIv").innerHTML=parseItalic(iv);
  document.getElementById("tpI").style.display=iv?"flex":"none";
  document.getElementById("tpQv").innerHTML=parseItalic(qv);
  document.getElementById("tpQ").style.display=qv?"flex":"none";
  var ni=document.getElementById("navIcon");
  if(ic!=="none"&&ICONS[ic]){ni.innerHTML='<img src="'+ICONS[ic]+'" alt="icon"/>';ni.style.display="flex";}
  else{ni.innerHTML="";ni.style.display="none";}
  var has=iv||qv;
  if(!has){document.getElementById("tPanel").classList.add("hidden");document.getElementById("showBtn").classList.remove("on");}
  else if(pvis){document.getElementById("tPanel").classList.remove("hidden");}
}
function tog(){
  pvis=!pvis;
  document.getElementById("tPanel").classList.toggle("hidden",!pvis);
  document.getElementById("showBtn").classList.toggle("on",!pvis);
}
function go(i){
  ifs[cur].classList.remove("active");
  cur=i;
  ifs[cur].classList.add("active");
  document.getElementById("prevBtn").disabled=(cur===0);
  document.getElementById("nextBtn").disabled=(cur===slides.length-1);
  document.getElementById("slideCounter").textContent=(cur+1)+" of "+slides.length;
  upd(slides[cur]);
}
function nav(d){var n=cur+d;if(n>=0&&n<slides.length)go(n);}
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight"||e.key==="ArrowDown")nav(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")nav(-1);
});
go(0);
</script>
